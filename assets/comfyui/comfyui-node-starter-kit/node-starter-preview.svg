  <foreignObject x='720' y='345' width='660' height='350'>
    <div xmlns='http://www.w3.org/1999/xhtml' style='font-family: monospace; color:#eaf2ff; font-size:20px; white-space:pre-wrap;'>[&#x27;class SlugifyText:&#x27;, &#x27;    CATEGORY = &quot;Scott/Productization&quot;&#x27;, &#x27;    RETURN_TYPES = (&quot;STRING&quot;,)&#x27;, &#x27;    FUNCTION = &quot;run&quot;&#x27;, &#x27;&#x27;, &#x27;    @classmethod&#x27;, &#x27;    def INPUT_TYPES(cls):&#x27;, &#x27;        return {&quot;required&quot;: {&quot;text&quot;: (&quot;STRING&quot;, {&quot;multiline&quot;: True, &quot;default&quot;: &quot;&quot;})}}&#x27;, &#x27;&#x27;, &#x27;    def run(self, text):&#x27;, &quot;        value = &#x27;&#x27;.join(ch.lower() if ch.isalnum() else &#x27;-&#x27; for ch in text)&quot;, &quot;        while &#x27;--&#x27; in value:&quot;, &quot;            value = value.replace(&#x27;--&#x27;, &#x27;-&#x27;)&quot;, &quot;        return (value.strip(&#x27;-&#x27;),)&quot;, &#x27;&#x27;, &#x27;&#x27;, &#x27;class ShotPresetSuffix:&#x27;, &#x27;    CATEGORY = &quot;Scott/Productization&quot;&#x27;]</div>
  </foreignObject>
  <text x='120' y='790' fill='#8ff0ff' font-size='24' font-family='Inter, Arial, sans-serif'>Buyer outcome: faster node-pack launch, less boilerplate, clearer upsell into custom implementation.</text>
